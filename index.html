<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基隆氣象站 80 周年｜雨港海韻．氣象八十</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 1.5rem;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .nav-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-card:hover {
            transform: translateY(-4px);
            background-color: white;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
        }
        .active-tab {
            background: #0369a1 !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(3, 105, 161, 0.2);
        }
        .active-video-btn {
            border-color: #0ea5e9 !important;
            background-color: #f0f9ff !important;
        }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-12">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row items-center justify-between mb-12 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-3xl md:text-4xl font-bold text-sky-900 tracking-tight">基隆氣象站 <span class="text-sky-600">80</span> 週年</h1>
                <p class="text-sky-700/60 font-medium mt-1 text-lg">雨港海韻．氣象八十 — 雲端導覽</p>
            </div>
            <nav class="flex gap-3 p-1.5 bg-sky-200/30 rounded-2xl">
                <button onclick="switchContent('video-section')" class="px-8 py-2.5 rounded-xl font-bold transition-all active-tab" id="tab-video">
                    影像故事
                </button>
                <button onclick="switchContent('quiz-section')" class="px-8 py-2.5 rounded-xl font-bold transition-all text-sky-800 hover:bg-white/50" id="tab-quiz">
                    知識挑戰
                </button>
            </nav>
        </header>

        <main>
            <!-- Video Section -->
            <section id="video-section" class="space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                    
                    <!-- Main Video Player -->
                    <div class="lg:col-span-8 glass-panel p-4 shadow-xl">
                        <div class="video-wrapper">
                            <iframe id="video-iframe" src="https://www.youtube.com/embed/5F_0lT4B_O0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                        </div>
                    </div>

                    <!-- Video Navigation & Info -->
                    <div class="lg:col-span-4 space-y-6">
                        <div class="glass-panel p-8">
                            <h2 class="text-2xl font-bold mb-4 text-sky-900" id="video-title">海港大樓與搬遷史</h2>
                            <p class="text-slate-600 leading-relaxed text-lg" id="video-desc">
                                從氣勢恢宏的海港大樓出發，回顧氣象站如何跨越時空遷徙至現址，這段旅程承載了基隆港口的風雨記憶。
                            </p>
                        </div>

                        <div class="grid grid-cols-1 gap-4">
                            <button onclick="loadVideo(0)" id="btn-0" class="nav-card p-4 rounded-2xl bg-white/40 flex items-center gap-4 border-2 border-transparent active-video-btn">
                                <div class="bg-sky-100 text-sky-600 w-12 h-12 rounded-xl flex items-center justify-center text-xl">
                                    <i class="fa-solid fa-landmark"></i>
                                </div>
                                <div class="text-left">
                                    <p class="font-bold">海港大樓與搬遷史</p>
                                    <p class="text-xs text-slate-400">時光倒流 80 年</p>
                                </div>
                            </button>
                            <button onclick="loadVideo(1)" id="btn-1" class="nav-card p-4 rounded-2xl bg-white/40 flex items-center gap-4 border-2 border-transparent">
                                <div class="bg-sky-100 text-sky-600 w-12 h-12 rounded-xl flex items-center justify-center text-xl">
                                    <i class="fa-solid fa-satellite-dish"></i>
                                </div>
                                <div class="text-left">
                                    <p class="font-bold">觀測任務與地方服務</p>
                                    <p class="text-xs text-slate-400">守護基隆的每一天</p>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Quiz Section (Hidden by default) -->
            <section id="quiz-section" class="hidden glass-panel p-12 min-h-[500px] flex flex-col items-center justify-center text-center shadow-xl">
                <div class="max-w-xl">
                    <div class="w-20 h-20 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-8 transform rotate-3 shadow-sm">
                        <i class="fa-solid fa-puzzle-piece"></i>
                    </div>
                    <h2 class="text-3xl font-bold text-sky-900 mb-6">看過影片了嗎？</h2>
                    <p class="text-xl text-slate-500 mb-10 leading-relaxed">
                        我們準備了幾個關於基隆氣象站的小測驗，<br>完成後您就是基隆站的頭號粉絲！
                    </p>
                    <a href="https://virgonelson.github.io/keelung_quiz/" target="_blank" class="inline-flex items-center gap-4 bg-sky-600 hover:bg-sky-700 text-white px-10 py-5 rounded-2xl text-xl font-bold transition-all hover:shadow-2xl hover:shadow-sky-300 active:scale-95">
                        開始挑戰 <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="mt-20 pt-8 border-t border-sky-200 text-center text-sky-900/40 text-sm">
            <p>中央氣象署 基隆氣象站 80 周年</p>
        </div>
    </div>

    <script>
        const videoData = [
            {
                title: "海港大樓與搬遷史",
                desc: "從氣勢恢宏的海港大樓出發，回顧氣象站如何跨越時空遷徙至現址，這段旅程承載了基隆港口的風雨記憶。",
                url: "https://www.youtube.com/embed/AjnE1zQXuzM"
            },
            {
                title: "觀測任務與地方服務",
                desc: "不只是觀測風雨。深入了解基隆氣象站如何提供在地化服務，從航運到民生，守護港都的每一天。",
                url: "https://www.youtube.com/embed/MTP8U9uizlI"
            }
        ];

        function switchContent(sectionId) {
            const videoSec = document.getElementById('video-section');
            const quizSec = document.getElementById('quiz-section');
            const tabVideo = document.getElementById('tab-video');
            const tabQuiz = document.getElementById('tab-quiz');

            if (sectionId === 'video-section') {
                videoSec.classList.remove('hidden');
                quizSec.classList.add('hidden');
                tabVideo.classList.add('active-tab');
                tabQuiz.classList.remove('active-tab');
                tabQuiz.classList.add('text-sky-800');
            } else {
                videoSec.classList.add('hidden');
                quizSec.classList.remove('hidden');
                tabQuiz.classList.add('active-tab');
                tabVideo.classList.remove('active-tab');
                tabVideo.classList.add('text-sky-800');
            }
        }

        function loadVideo(index) {
            const video = videoData[index];
            const iframe = document.getElementById('video-iframe');
            const title = document.getElementById('video-title');
            const desc = document.getElementById('video-desc');

            // 更新按鈕樣式
            document.querySelectorAll('.nav-card').forEach((btn, i) => {
                if (i === index) btn.classList.add('active-video-btn');
                else btn.classList.remove('active-video-btn');
            });

            // 更新內容
            iframe.style.opacity = '0.4';
            setTimeout(() => {
                iframe.src = video.url;
                title.innerText = video.title;
                desc.innerText = video.desc;
                iframe.style.opacity = '1';
            }, 300);
        }
    </script>
</body>
</html>
